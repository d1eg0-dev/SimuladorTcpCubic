<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador TCP Cubic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>Simulador TCP Cubic</h1>

  <div class="controls">
    <label>cwnd inicial</label>
    <input type="number" id="cwnd" value="">

    <label>ssthresh</label>
    <input type="number" id="ssthresh" value="">

    <button onclick="start()">Iniciar</button>
    <button onclick="step()">Paso</button>
    <button onclick="loss()">Pérdida</button>
    <button onclick="resetSim()">Reiniciar</button>
  </div>

  <canvas id="canvas" width="800" height="400"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
